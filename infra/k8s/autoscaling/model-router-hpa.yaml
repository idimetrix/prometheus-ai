apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: model-router-hpa
  namespace: prometheus
  labels:
    app: model-router
    component: autoscaling
  annotations:
    prometheus.io/custom-metrics: "true"
    autoscaling.kubernetes.io/metrics: "cpu,memory,request-latency"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: model-router
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: http_request_duration_p95_ms
        target:
          type: AverageValue
          averageValue: "500"
    - type: Pods
      pods:
        metric:
          name: model_inference_queue_depth
        target:
          type: AverageValue
          averageValue: "20"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
