apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: socket-server-hpa
  namespace: prometheus
  labels:
    app: socket-server
    component: autoscaling
  annotations:
    prometheus.io/custom-metrics: "true"
    autoscaling.kubernetes.io/metrics: "cpu,memory,websocket-connections"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: socket-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: ws_active_connections
        target:
          type: AverageValue
          averageValue: "500"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
