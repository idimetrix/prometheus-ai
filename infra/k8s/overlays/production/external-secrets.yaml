# External Secrets Operator — Production Secrets Management
# Syncs secrets from AWS Secrets Manager (or other backends) into
# Kubernetes Secret resources, eliminating the need to store sensitive
# values in manifests or CI environment variables.
#
# Prerequisites:
#   1. External Secrets Operator installed in the cluster
#   2. ClusterSecretStore "aws-secrets-manager" configured with IAM role
#   3. Secrets created in AWS Secrets Manager under the "prometheus/production/" prefix

---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets

---
# ──────────────────────────────────────────────
# Database Credentials
# ──────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: database-credentials
  namespace: prometheus
  labels:
    app.kubernetes.io/part-of: prometheus
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: database-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        DATABASE_URL: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .dbname }}?sslmode=require"
        DATABASE_READ_URL: "postgresql://{{ .username }}:{{ .password }}@{{ .read_host }}:{{ .port }}/{{ .dbname }}?sslmode=require"
  data:
    - secretKey: username
      remoteRef:
        key: prometheus/production/database
        property: username
    - secretKey: password
      remoteRef:
        key: prometheus/production/database
        property: password
    - secretKey: host
      remoteRef:
        key: prometheus/production/database
        property: host
    - secretKey: read_host
      remoteRef:
        key: prometheus/production/database
        property: read_host
    - secretKey: port
      remoteRef:
        key: prometheus/production/database
        property: port
    - secretKey: dbname
      remoteRef:
        key: prometheus/production/database
        property: dbname

