apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: patroni
  labels:
    app: patroni
    cluster-name: prometheus-pg
spec:
  serviceName: patroni
  replicas: 3
  selector:
    matchLabels:
      app: patroni
      cluster-name: prometheus-pg
  template:
    metadata:
      labels:
        app: patroni
        cluster-name: prometheus-pg
    spec:
      containers:
        - name: patroni
          image: registry.opensource.zalan.do/acid/spilo-16:3.2-p2
          ports:
            - containerPort: 5432
              name: postgresql
            - containerPort: 8008
              name: patroni-api
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PGPASSWORD_SUPERUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: superuser-password
            - name: PGPASSWORD_REPLICATION
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: replication-password
            - name: SCOPE
              value: prometheus-pg
            - name: PATRONI_KUBERNETES_LABELS
              value: "{app: patroni, cluster-name: prometheus-pg}"
            - name: PATRONI_KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PATRONI_SUPERUSER_USERNAME
              value: postgres
            - name: PATRONI_REPLICATION_USERNAME
              value: replicator
            - name: PATRONI_POSTGRESQL_DATA_DIR
              value: /home/postgres/pgdata/pgroot/data
            - name: PATRONI_POSTGRESQL_PARAMETERS
              value: |
                max_connections: 200
                shared_buffers: 512MB
                work_mem: 8MB
                maintenance_work_mem: 256MB
                wal_level: replica
                max_wal_senders: 5
                max_replication_slots: 5
                hot_standby: "on"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: pgdata
              mountPath: /home/postgres/pgdata
          readinessProbe:
            httpGet:
              path: /readiness
              port: 8008
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /liveness
              port: 8008
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: patroni
  labels:
    app: patroni
    cluster-name: prometheus-pg
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgresql
  selector:
    app: patroni
    cluster-name: prometheus-pg
    role: master
---
apiVersion: v1
kind: Service
metadata:
  name: patroni-replica
  labels:
    app: patroni
    cluster-name: prometheus-pg
    role: replica
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgresql
  selector:
    app: patroni
    cluster-name: prometheus-pg
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: patroni
spec:
  rules:
    - apiGroups: [""]
      resources: ["configmaps"]
      verbs: ["create", "get", "list", "patch", "update", "watch", "delete"]
    - apiGroups: [""]
      resources: ["endpoints"]
      verbs: ["create", "get", "list", "patch", "update", "watch", "delete"]
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: patroni
subjects:
  - kind: ServiceAccount
    name: default
roleRef:
  kind: Role
  name: patroni
  apiGroup: rbac.authorization.k8s.io
