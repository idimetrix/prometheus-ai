  namespace: prometheus
  labels:
    app.kubernetes.io/part-of: prometheus
spec:
  podSelector:
    matchLabels:
      app: sandbox
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 151.101.0.0/16
        - ipBlock:
            cidr: 2a04:4e42::/32
      ports:
        - protocol: TCP
          port: 443
