## All services -> PostgreSQL (via pgbouncer)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-pgbouncer
  namespace: prometheus
  labels:
    app.kubernetes.io/part-of: prometheus
spec:
  podSelector:
    matchLabels:
      app: pgbouncer
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
        - podSelector:
            matchLabels:
              app: orchestrator
        - podSelector:
            matchLabels:
              app: queue-worker
        - podSelector:
            matchLabels:
              app: project-brain
      ports:
        - protocol: TCP
          port: 6432
---
