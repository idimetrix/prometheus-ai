apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: prometheus
  labels:
    app: orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: ghcr.io/prometheus/orchestrator:latest
          ports:
            - containerPort: 4002
          envFrom:
            - configMapRef:
                name: prometheus-config
            - secretRef:
                name: prometheus-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: prometheus
spec:
  selector:
    app: orchestrator
  ports:
    - port: 4002
      targetPort: 4002
