apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: prometheus
  labels:
    app: pgbouncer
    app.kubernetes.io/part-of: prometheus
data:
  pgbouncer.ini: |
    [databases]
    prometheus = host=${DATABASE_HOST} port=${DATABASE_PORT} dbname=${DATABASE_NAME}

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    max_client_conn = 500
    default_pool_size = 30
    min_pool_size = 5
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    server_idle_timeout = 600
    server_lifetime = 3600
    server_connect_timeout = 15
    query_wait_timeout = 120
    log_connections = 1
    log_disconnections = 1
    log_pooler_errors = 1
    stats_period = 60
    admin_users = postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: prometheus
  labels:
    app: pgbouncer
    app.kubernetes.io/part-of: prometheus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
        app.kubernetes.io/part-of: prometheus
    spec:
      containers:
        - name: pgbouncer
          image: bitnami/pgbouncer:1.22.0
          ports:
            - containerPort: 6432
              protocol: TCP
          env:
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: host
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: database
            - name: POSTGRESQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: password
            - name: PGBOUNCER_POOL_MODE
              value: "transaction"
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: "500"
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: "30"
            - name: PGBOUNCER_MIN_POOL_SIZE
              value: "5"
            - name: PGBOUNCER_RESERVE_POOL_SIZE
              value: "5"
            - name: PGBOUNCER_SERVER_IDLE_TIMEOUT
              value: "600"
          volumeMounts:
            - name: pgbouncer-config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: pgbouncer-config
          configMap:
            name: pgbouncer-config
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: prometheus
  labels:
    app: pgbouncer
    app.kubernetes.io/part-of: prometheus
spec:
  selector:
    app: pgbouncer
  ports:
    - port: 6432
      targetPort: 6432
      protocol: TCP
      name: pgbouncer
  type: ClusterIP
