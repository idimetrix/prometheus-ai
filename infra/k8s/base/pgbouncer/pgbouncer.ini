;; PgBouncer configuration for Prometheus platform
;; Pool mode: transaction — connections are returned to the pool after each transaction
;; This maximizes connection reuse across the microservices fleet.

[databases]
;; Connect to the main Prometheus database via DATABASE_URL components
;; In k8s, these are injected from postgres-secrets
prometheus = host=${DATABASE_HOST} port=${DATABASE_PORT} dbname=${DATABASE_NAME} auth_user=${DATABASE_USER}

[pgbouncer]
;; Network settings
listen_addr = 0.0.0.0
listen_port = 6432

;; Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; Pool settings
pool_mode = transaction
max_client_conn = 500
default_pool_size = 30
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

;; Timeouts
server_idle_timeout = 600
server_lifetime = 3600
server_connect_timeout = 15
query_wait_timeout = 120
client_idle_timeout = 0
client_login_timeout = 60

;; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60
verbose = 0

;; Security
server_tls_sslmode = prefer

;; Admin
admin_users = postgres
stats_users = prometheus_stats
