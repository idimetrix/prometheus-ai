apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-worker
  namespace: prometheus
  labels:
    app: queue-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: queue-worker
  template:
    metadata:
      labels:
        app: queue-worker
    spec:
      containers:
        - name: queue-worker
          image: ghcr.io/prometheus/queue-worker:latest
          resources:
            requests:
              cpu: 500m
              memory: 1.5Gi
            limits:
              cpu: "1"
              memory: 2Gi
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          readinessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
