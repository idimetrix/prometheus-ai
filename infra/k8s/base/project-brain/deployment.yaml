apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-brain
  namespace: prometheus
  labels:
    app: project-brain
spec:
  replicas: 2
  selector:
    matchLabels:
      app: project-brain
  template:
    metadata:
      labels:
        app: project-brain
    spec:
      containers:
        - name: project-brain
          image: ghcr.io/prometheus/project-brain:latest
          ports:
            - containerPort: 4003
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 5
            periodSeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
---
apiVersion: v1
kind: Service
metadata:
  name: project-brain
  namespace: prometheus
spec:
  selector:
    app: project-brain
  ports:
    - port: 4003
      targetPort: 4003
