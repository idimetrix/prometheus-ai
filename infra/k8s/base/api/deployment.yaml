apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: prometheus
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
      annotations:
        container.apparmor.security.beta.kubernetes.io/api: runtime/default
    spec:
      containers:
        - name: api
          image: ghcr.io/prometheus/api:latest
          ports:
            - containerPort: 4000
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1.5"
              memory: 1.5Gi
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
