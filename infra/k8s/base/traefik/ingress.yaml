apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus-ingress
  namespace: prometheus
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`app.prometheus.dev`)
      kind: Rule
      services:
        - name: web
          port: 3000
    - match: Host(`api.prometheus.dev`)
      kind: Rule
      services:
        - name: api
          port: 4000
    - match: Host(`ws.prometheus.dev`)
      kind: Rule
      services:
        - name: socket-server
          port: 4001
    - match: Host(`api.prometheus.dev`) && PathPrefix(`/api/sse`)
      kind: Rule
      services:
        - name: api
          port: 4000
      middlewares:
        - name: sse-headers
  tls:
    certResolver: letsencrypt
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sse-headers
  namespace: prometheus
spec:
  headers:
    customResponseHeaders:
      X-Accel-Buffering: "no"
      Cache-Control: "no-cache"
