apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: agent-worker-scaler
  namespace: prometheus
spec:
  scaleTargetRef:
    name: agent-worker
  minReplicaCount: 2
  maxReplicaCount: 16
  pollingInterval: 10
  cooldownPeriod: 120
  triggers:
    - type: redis
      metadata:
        address: redis.prometheus.svc.cluster.local:6379
        listName: "bull:agent-tasks:wait"
        listLength: "1"
        activationListLength: "0"
      authenticationRef:
        name: redis-auth
