apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: queue-worker-scaler
  namespace: prometheus
spec:
  scaleTargetRef:
    name: queue-worker
  minReplicaCount: 2
  maxReplicaCount: 16
  pollingInterval: 10
  cooldownPeriod: 120
  triggers:
    - type: redis
      metadata:
        address: redis.prometheus.svc.cluster.local:6379
        listName: "bull:agent-tasks:wait"
        listLength: "5"
        activationListLength: "0"
      authenticationRef:
        name: redis-auth
    - type: redis
      metadata:
        address: redis.prometheus.svc.cluster.local:6379
        listName: "bull:code-execution:wait"
        listLength: "3"
        activationListLength: "0"
      authenticationRef:
        name: redis-auth
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: redis-auth
  namespace: prometheus
spec:
  secretTargetRef:
    - parameter: password
      name: redis-auth
      key: password
