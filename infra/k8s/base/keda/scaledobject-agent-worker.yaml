# KEDA ScaledObject for agent worker pool
# Scales based on agent-tasks and enterprise-tasks queue depths
# Updated for Phase 9: maxReplicas 32, split worker pools
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: queue-worker-agent-scaler
  namespace: prometheus
  labels:
    app: queue-worker-agent
spec:
  scaleTargetRef:
    name: queue-worker-agent
  minReplicaCount: 4
  maxReplicaCount: 32
  pollingInterval: 10
  cooldownPeriod: 120
  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 25
              periodSeconds: 120
            - type: Pods
              value: 2
              periodSeconds: 60
          selectPolicy: Min
        scaleUp:
          stabilizationWindowSeconds: 15
          policies:
            - type: Pods
              value: 4
              periodSeconds: 30
            - type: Percent
              value: 50
              periodSeconds: 60
          selectPolicy: Max
  triggers:
    # Agent tasks queue — primary scaling driver
    - type: redis
      metadata:
        address: redis.prometheus.svc.cluster.local:6379
        listName: "bull:agent-tasks:wait"
        listLength: "3"
        activationListLength: "0"
      authenticationRef:
        name: redis-auth
    # Enterprise tasks queue — higher priority, lower threshold
    - type: redis
      metadata:
        address: redis.prometheus.svc.cluster.local:6379
        listName: "bull:enterprise-tasks:wait"
        listLength: "2"
        activationListLength: "0"
      authenticationRef:
        name: redis-auth
    # Code execution queue
    - type: redis
      metadata:
        address: redis.prometheus.svc.cluster.local:6379
        listName: "bull:code-execution:wait"
        listLength: "3"
        activationListLength: "0"
      authenticationRef:
        name: redis-auth
    # CPU-based scaling fallback
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: redis-auth
  namespace: prometheus
spec:
  secretTargetRef:
    - parameter: password
      name: redis-auth
      key: password
