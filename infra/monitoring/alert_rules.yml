groups:
  # ─── Service Health ─────────────────────────────────────────────
  - name: service_health
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} ({{ $labels.instance }}) has been unreachable for more than 1 minute."

      - alert: HealthCheckFailing
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Health check failing for {{ $labels.instance }}"
          description: "Health check endpoint {{ $labels.instance }} has been failing for more than 2 minutes."

  # ─── Error Rates ────────────────────────────────────────────────
  - name: error_rates
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
          / sum(rate(http_requests_total[5m])) by (job)
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} has >5% error rate (current: {{ $value | humanizePercentage }})."

      - alert: CriticalErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)
          / sum(rate(http_requests_total[5m])) by (job)
          > 0.15
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} has >15% error rate (current: {{ $value | humanizePercentage }})."

  # ─── Latency ────────────────────────────────────────────────────
  - name: latency
    rules:
      - alert: HighP99Latency
        expr: |
          histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job))
          > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency on {{ $labels.job }}"
          description: "{{ $labels.job }} p99 latency is above 5 seconds (current: {{ $value | humanizeDuration }})."

  # ─── Queue Health ───────────────────────────────────────────────
  - name: queue_health
    rules:
      - alert: QueueBackup
        expr: bullmq_queue_waiting > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Queue backup: {{ $labels.queue }}"
          description: "Queue {{ $labels.queue }} has {{ $value }} waiting jobs (threshold: 1000)."

      - alert: CriticalQueueBackup
        expr: bullmq_queue_waiting > 5000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical queue backup: {{ $labels.queue }}"
          description: "Queue {{ $labels.queue }} has {{ $value }} waiting jobs (threshold: 5000)."

      - alert: HighDLQCount
        expr: bullmq_dlq_total > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Dead letter queue growing: {{ $labels.queue }}"
          description: "DLQ for {{ $labels.queue }} has {{ $value }} messages."

  # ─── Credits / Billing ──────────────────────────────────────────
  - name: billing
    rules:
      - alert: LowCreditsOrg
        expr: prometheus_org_credits_remaining < 100
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Low credits for org {{ $labels.org_id }}"
          description: "Organization {{ $labels.org_id }} has only {{ $value }} credits remaining."

  # ─── Infrastructure ─────────────────────────────────────────────
  - name: infrastructure
    rules:
      - alert: HighMemoryUsage
        expr: |
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 90% (current: {{ $value | humanizePercentage }})."

      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 85% for 10 minutes."

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space low on {{ $labels.instance }}"
          description: "Less than 10% disk space remaining on root partition."

      - alert: PostgresConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High PostgreSQL connections"
          description: "PostgreSQL has {{ $value }} active connections (threshold: 80)."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis is using more than 85% of max configured memory."
