global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    # Critical alerts — shorter repeat interval
    - match:
        severity: critical
      receiver: "critical"
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts
    - match:
        severity: warning
      receiver: "default"
      repeat_interval: 4h

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://api:4000/webhooks/alerts"
        send_resolved: true

  - name: "critical"
    webhook_configs:
      - url: "http://api:4000/webhooks/alerts"
        send_resolved: true

# Inhibition rules — prevent warning alerts when critical already firing
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "job"]
