global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  # External labels for cross-cluster identification
  external_labels:
    cluster: prometheus-prod
    environment: production

# Enable native histograms and exemplar storage for trace correlation
storage:
  tsdb:
    out_of_order_time_window: 30m
  exemplars:
    max_exemplars: 100000

# Tracing: send Prometheus's own traces to the OTel collector
tracing:
  endpoint: "otel-collector.prometheus.svc.cluster.local:4317"
  insecure: true
  sampling_fraction: 0.1

# Remote write for long-term storage (Thanos/Mimir)
# Uncomment for production:
# remote_write:
#   - url: "http://mimir.prometheus.svc.cluster.local:9009/api/v1/push"
#     send_exemplars: true
#     queue_config:
#       max_samples_per_send: 5000
#       batch_send_deadline: 5s

# Alert rules
rule_files:
  - "alert_rules.yml"
  - "alerts.yaml"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ─── Prometheus Platform Services ─────────────────────────────

  - job_name: "api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:4000"]
    scrape_interval: 10s

  - job_name: "orchestrator"
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestrator:4002"]

  - job_name: "project-brain"
    metrics_path: /metrics
    static_configs:
      - targets: ["project-brain:4003"]

  - job_name: "model-router"
    metrics_path: /metrics
    static_configs:
      - targets: ["model-router:4004"]

  - job_name: "mcp-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["mcp-gateway:4005"]

  - job_name: "sandbox-manager"
    metrics_path: /metrics
    static_configs:
      - targets: ["sandbox-manager:4006"]

  - job_name: "socket-server"
    metrics_path: /metrics
    static_configs:
      - targets: ["socket-server:4001"]

  - job_name: "queue-worker-agent"
    metrics_path: /metrics
    static_configs:
      - targets: ["queue-worker-agent:4010"]
    relabel_configs:
      - target_label: worker_pool
        replacement: agent

  - job_name: "queue-worker-background"
    metrics_path: /metrics
    static_configs:
      - targets: ["queue-worker-background:4011"]
    relabel_configs:
      - target_label: worker_pool
        replacement: background

  - job_name: "queue-worker-billing"
    metrics_path: /metrics
    static_configs:
      - targets: ["queue-worker-billing:4012"]
    relabel_configs:
      - target_label: worker_pool
        replacement: billing

  # ─── Per-Org / Per-Role Label Enrichment ─────────────────────
  # Metrics from services that include org_id/role in their labels
  # are relabeled here for multi-tenant dashboards.

  - job_name: "api-per-org"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:4000"]
    scrape_interval: 30s
    metric_relabel_configs:
      - source_labels: [org_id]
        target_label: org_id
        action: replace
      - source_labels: [user_role]
        target_label: role
        action: replace
      # Drop high-cardinality labels we don't need in Prometheus
      - regex: "user_id|session_id"
        action: labeldrop

  # ─── Distributed Tracing (Exemplars + Trace Context) ─────────
  # Scrape OpenTelemetry collector for trace-to-metric correlation

  - job_name: "otel-collector"
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector.prometheus.svc.cluster.local:8888"]
    scrape_interval: 15s

  - job_name: "tempo"
    metrics_path: /metrics
    static_configs:
      - targets: ["tempo.prometheus.svc.cluster.local:3200"]
    scrape_interval: 30s

  # ─── Loki (Log Aggregation Metrics) ─────────────────────────

  - job_name: "loki"
    metrics_path: /metrics
    static_configs:
      - targets: ["loki.prometheus.svc.cluster.local:3100"]

  # ─── Health check probing (via blackbox exporter, optional) ───

  - job_name: "health-checks"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - "http://api:4000/health"
          - "http://model-router:4004/health"
          - "http://project-brain:4003/health"
          - "http://mcp-gateway:4005/health"
          - "http://sandbox-manager:4006/health"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "blackbox-exporter:9115"

  # ─── Infrastructure ───────────────────────────────────────────

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]
