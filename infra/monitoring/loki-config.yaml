# ════════════════════════════════════════════════════════════════
# Loki + Promtail Configuration for Centralized Log Aggregation
# Phase 9.6: Observability Enhancements
# ════════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────
# Loki Server Configuration
# ──────────────────────────────────────────────────────────────
loki:
  auth_enabled: false

  server:
    http_listen_port: 3100
    grpc_listen_port: 9096
    log_level: info

  common:
    path_prefix: /loki
    storage:
      filesystem:
        chunks_directory: /loki/chunks
        rules_directory: /loki/rules
    replication_factor: 1
    ring:
      instance_addr: 127.0.0.1
      kvstore:
        store: inmemory

  schema_config:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage_config:
    tsdb_shipper:
      active_index_directory: /loki/tsdb-index
      cache_location: /loki/tsdb-cache

  # S3/MinIO backend for production
  # Uncomment and configure for production deployments:
  # storage_config:
  #   aws:
  #     s3: s3://minio.prometheus.svc.cluster.local:9000
  #     bucketnames: loki-chunks
  #     region: us-east-1
  #     access_key_id: ${MINIO_ACCESS_KEY}
  #     secret_access_key: ${MINIO_SECRET_KEY}
  #     s3forcepathstyle: true
  #     insecure: true

  limits_config:
    # Retention
    retention_period: 720h         # 30 days
    reject_old_samples: true
    reject_old_samples_max_age: 168h  # 7 days
    # Ingestion limits
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    per_stream_rate_limit: 5MB
    per_stream_rate_limit_burst: 15MB
    max_entries_limit_per_query: 10000
    max_query_series: 500
    max_query_parallelism: 16

  compactor:
    working_directory: /loki/compactor
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 150
    delete_request_store: filesystem

  query_range:
    align_queries_with_step: true
    cache_results: true
    results_cache:
      cache:
        embedded_cache:
          enabled: true
          max_size_mb: 256

  analytics:
    reporting_enabled: false

# ──────────────────────────────────────────────────────────────
# Promtail Agent Configuration
# Collects logs from all Prometheus platform pods
# ──────────────────────────────────────────────────────────────
promtail:
  server:
    http_listen_port: 9080
    grpc_listen_port: 0

  positions:
    filename: /tmp/positions.yaml

  clients:
    - url: http://loki.prometheus.svc.cluster.local:3100/loki/api/v1/push
      tenant_id: prometheus
      batchwait: 1s
      batchsize: 1048576
      external_labels:
        cluster: prometheus-prod

  scrape_configs:
    # ── Kubernetes Pod Logs ──────────────────────────────
    - job_name: kubernetes-pods
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
              - prometheus
      relabel_configs:
        # Only scrape pods in the prometheus namespace
        - source_labels: [__meta_kubernetes_namespace]
          action: keep
          regex: prometheus
        # Use pod name as instance label
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        # Use container name
        - source_labels: [__meta_kubernetes_pod_container_name]
          target_label: container
        # Use app label from pod
        - source_labels: [__meta_kubernetes_pod_label_app]
          target_label: app
        # Use pool label for queue workers
        - source_labels: [__meta_kubernetes_pod_label_pool]
          target_label: worker_pool
        # Use node name
        - source_labels: [__meta_kubernetes_pod_node_name]
          target_label: node

      pipeline_stages:
        # ── Detect JSON logs ──────────────────────────────
        - match:
            selector: '{app=~".+"}'
            stages:
              - json:
                  expressions:
                    level: level
                    msg: msg
                    message: message
                    error: error
                    trace_id: traceId
                    span_id: spanId
                    org_id: orgId
                    user_id: userId
                    request_id: requestId
                    duration_ms: durationMs
                    service: service

              # Normalize level field
              - template:
                  source: level
                  template: '{{ ToLower .Value }}'

              # Set log level as a label
              - labels:
                  level:
                  service:

              # Extract trace context for correlation
              - labels:
                  trace_id:
                  org_id:

              # Parse timestamp from JSON if present
              - timestamp:
                  source: timestamp
                  format: RFC3339Nano
                  fallback_formats:
                    - "2006-01-02T15:04:05.000Z"
                    - UnixMs

        # ── Drop noisy health check logs ──────────────────
        - match:
            selector: '{app=~".+"}'
            stages:
              - regex:
                  expression: '.*GET /health.*'
              - drop:
                  source: ""
                  expression: '.*GET /health.*'
                  drop_counter_reason: health_check

        # ── Extract error stack traces (multiline) ────────
        - multiline:
            firstline: '^\d{4}-\d{2}-\d{2}|^\{|^[A-Z][a-z]+Error|^Error:'
            max_wait_time: 3s
            max_lines: 50

        # ── Add structured metadata ──────────────────────
        - structured_metadata:
            trace_id:
            span_id:
            org_id:
            user_id:
            request_id:

    # ── System logs (node-level) ──────────────────────────
    - job_name: system-logs
      static_configs:
        - targets:
            - localhost
          labels:
            job: system
            __path__: /var/log/syslog
      pipeline_stages:
        - regex:
            expression: '^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\w+)\s+(?P<process>\w+).*'
        - labels:
            hostname:
            process:
