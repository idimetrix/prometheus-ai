# Prometheus Redis Configuration
# For production use with Valkey/Redis 8

# ─── Memory ───────────────────────────────────────────────────────
maxmemory 800mb
maxmemory-policy allkeys-lru

# ─── Persistence ──────────────────────────────────────────────────
# AOF for durability (append-only file)
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots as backup
save 900 1
save 300 10
save 60 10000

# ─── Performance ──────────────────────────────────────────────────
# IO threads for read/write (Valkey 8 / Redis 7+)
io-threads 4
io-threads-do-reads yes

# Lazy freeing for better latency
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ─── Key Expiration Defaults ─────────────────────────────────────
# These are application-level conventions (not Redis config):
# - Session events: 7 days (604800s)
# - Rate limit windows: 1 hour (3600s)
# - Health check cache: 30 seconds
# - Pub/sub channels: no expiry (ephemeral)
# - Queue jobs: managed by BullMQ

# ─── Security ────────────────────────────────────────────────────
# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""

# ─── Networking ──────────────────────────────────────────────────
tcp-keepalive 300
timeout 0
tcp-backlog 511

# ─── Logging ─────────────────────────────────────────────────────
loglevel notice

# ─── Clients ─────────────────────────────────────────────────────
maxclients 10000
