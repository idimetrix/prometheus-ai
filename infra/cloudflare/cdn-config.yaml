# ════════════════════════════════════════════════════════════════
# Cloudflare CDN Configuration for Prometheus Platform
# Phase 9.7: CDN and Edge Caching
#
# Apply via Cloudflare API or Terraform cloudflare provider.
# This file serves as the declarative source of truth.
# ════════════════════════════════════════════════════════════════

zone: prometheus.dev

# ──────────────────────────────────────────────────────────────
# SSL/TLS Settings
# ──────────────────────────────────────────────────────────────
ssl:
  mode: full_strict
  min_tls_version: "1.2"
  early_hints: true
  always_use_https: true

# ──────────────────────────────────────────────────────────────
# Performance Settings
# ──────────────────────────────────────────────────────────────
performance:
  auto_minify:
    javascript: true
    css: true
    html: false
  brotli: true
  early_hints: true
  http2: true
  http3: true
  websockets: true
  rocket_loader: false  # Disabled — Next.js manages script loading
  mirage: false

# ──────────────────────────────────────────────────────────────
# Cache Rules — Next.js Static Assets
# ──────────────────────────────────────────────────────────────
cache_rules:
  # Rule 1: Next.js immutable static assets (hashed filenames)
  # These never change — cache aggressively at the edge
  - name: "nextjs-static-immutable"
    expression: '(http.request.uri.path matches "^/_next/static/.*")'
    action: cache
    cache_settings:
      edge_ttl: 31536000         # 1 year
      browser_ttl: 31536000      # 1 year
      cache_level: aggressive
      respect_strong_etags: true
    headers:
      Cache-Control: "public, max-age=31536000, immutable"

  # Rule 2: Next.js image optimization output
  - name: "nextjs-optimized-images"
    expression: '(http.request.uri.path matches "^/_next/image.*")'
    action: cache
    cache_settings:
      edge_ttl: 86400            # 24 hours
      browser_ttl: 86400
    headers:
      Cache-Control: "public, max-age=86400, stale-while-revalidate=3600"

  # Rule 3: Public static files (favicon, robots.txt, sitemap)
  - name: "public-static-files"
    expression: '(http.request.uri.path matches "^/(favicon\.ico|robots\.txt|sitemap\.xml|manifest\.json)$")'
    action: cache
    cache_settings:
      edge_ttl: 86400
      browser_ttl: 3600
    headers:
      Cache-Control: "public, max-age=3600, stale-while-revalidate=86400"

  # Rule 4: Font files
  - name: "font-files"
    expression: '(http.request.uri.path matches ".*\.(woff|woff2|ttf|otf|eot)$")'
    action: cache
    cache_settings:
      edge_ttl: 31536000
      browser_ttl: 31536000
    headers:
      Cache-Control: "public, max-age=31536000, immutable"
      Access-Control-Allow-Origin: "*"

  # Rule 5: Public API responses — pricing plans, presets, feature flags
  # Cached at edge to reduce origin load for unauthenticated reads
  - name: "public-api-cache"
    expression: >
      (http.request.uri.path matches "^/api/v1/public/(plans|presets|features|models)$"
      and http.request.method eq "GET")
    action: cache
    cache_settings:
      edge_ttl: 300              # 5 minutes
      browser_ttl: 60            # 1 minute
      cache_level: standard
      cache_key:
        include_query_string: true
    headers:
      Cache-Control: "public, max-age=60, s-maxage=300, stale-while-revalidate=600"
      Vary: "Accept-Encoding"

  # Rule 6: API documentation / OpenAPI spec
  - name: "api-docs-cache"
    expression: '(http.request.uri.path matches "^/api/(docs|openapi\.json)$")'
    action: cache
    cache_settings:
      edge_ttl: 3600
      browser_ttl: 1800
    headers:
      Cache-Control: "public, max-age=1800, s-maxage=3600"

# ──────────────────────────────────────────────────────────────
# Page Rules — Dynamic vs Static Content Separation
# ──────────────────────────────────────────────────────────────
page_rules:
  # Dynamic content: API endpoints (authenticated)
  - target: "api.prometheus.dev/api/v1/*"
    settings:
      cache_level: bypass
      security_level: high
    condition: '(not http.request.uri.path matches "^/api/v1/public/")'

  # Dynamic content: WebSocket connections
  - target: "ws.prometheus.dev/*"
    settings:
      cache_level: bypass

  # Dynamic content: Auth/session endpoints
  - target: "app.prometheus.dev/api/auth/*"
    settings:
      cache_level: bypass
      security_level: high

  # Static: Marketing / docs pages
  - target: "prometheus.dev/docs/*"
    settings:
      cache_level: aggressive
      edge_ttl: 7200
      browser_ttl: 3600

# ──────────────────────────────────────────────────────────────
# Transform Rules — Security & Cache Headers
# ──────────────────────────────────────────────────────────────
transform_rules:
  # Add security headers to all responses
  - name: "security-headers"
    expression: "true"
    headers:
      set:
        X-Content-Type-Options: "nosniff"
        X-Frame-Options: "DENY"
        Referrer-Policy: "strict-origin-when-cross-origin"
        Permissions-Policy: "camera=(), microphone=(), geolocation=()"
        X-XSS-Protection: "1; mode=block"

  # Strip cookies from cacheable static responses
  - name: "strip-cookies-static"
    expression: '(http.request.uri.path matches "^/_next/static/.*")'
    headers:
      remove:
        - Set-Cookie
        - Cookie

  # Add CORS headers for API
  - name: "api-cors"
    expression: '(http.request.uri.path matches "^/api/")'
    headers:
      set:
        Access-Control-Allow-Origin: "https://app.prometheus.dev"
        Access-Control-Allow-Methods: "GET, POST, PUT, DELETE, OPTIONS"
        Access-Control-Allow-Headers: "Content-Type, Authorization, X-Request-ID, X-Trace-ID"
        Access-Control-Max-Age: "86400"

# ──────────────────────────────────────────────────────────────
# Rate Limiting Rules
# ──────────────────────────────────────────────────────────────
rate_limiting:
  - name: "api-rate-limit"
    expression: '(http.request.uri.path matches "^/api/" and not http.request.uri.path matches "^/api/v1/public/")'
    characteristics:
      - cf.unique_visitor_id
      - http.request.headers["authorization"]
    period: 60
    requests_per_period: 300
    mitigation_action: challenge

  - name: "auth-rate-limit"
    expression: '(http.request.uri.path matches "^/api/auth/")'
    characteristics:
      - ip.src
    period: 300
    requests_per_period: 20
    mitigation_action: block

# ──────────────────────────────────────────────────────────────
# DNS Records (reference — managed via dns-config.md)
# ──────────────────────────────────────────────────────────────
dns_records:
  - type: A
    name: "app"
    content: "${ORIGIN_IP}"
    proxied: true
  - type: A
    name: "api"
    content: "${ORIGIN_IP}"
    proxied: true
  - type: A
    name: "ws"
    content: "${ORIGIN_IP}"
    proxied: true
  - type: CNAME
    name: "docs"
    content: "app.prometheus.dev"
    proxied: true
