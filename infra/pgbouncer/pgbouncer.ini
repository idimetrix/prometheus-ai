; PgBouncer configuration for Prometheus
; Transaction-mode pooling for maximum connection efficiency

[databases]
; Default database connection
prometheus = host=postgres port=5432 dbname=prometheus

[pgbouncer]
; ─── Connection Limits ─────────────────────────────────────────────────────────
; Maximum number of client connections allowed
max_client_conn = 200

; Default number of server connections per user/database pair
default_pool_size = 50

; Minimum number of server connections per pool (maintained even if idle)
min_pool_size = 5

; Maximum connections added to pool per second (prevents thundering herd)
reserve_pool_size = 10
reserve_pool_timeout = 3

; ─── Pooling Mode ──────────────────────────────────────────────────────────────
; transaction: Server is released back to pool after each transaction
; This is the recommended mode for most applications
pool_mode = transaction

; ─── Timeouts ──────────────────────────────────────────────────────────────────
; Maximum time queries are allowed to spend waiting for execution
query_wait_timeout = 60

; Maximum time to wait for a connection to become available
client_login_timeout = 60

; Server connection idle timeout
server_idle_timeout = 600

; Server connection lifetime (force reconnect after this)
server_lifetime = 3600

; Time to wait for a server connection to be established
server_connect_timeout = 15

; How long to wait before cancelling a query to server
query_timeout = 300

; Close client connection if no activity in this many seconds
client_idle_timeout = 0

; ─── Authentication ────────────────────────────────────────────────────────────
; Authentication type (trust for Docker, md5 or scram-sha-256 for production)
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; ─── Logging ───────────────────────────────────────────────────────────────────
; Log all connections
log_connections = 1

; Log all disconnections
log_disconnections = 1

; Log pooler errors to help with debugging
log_pooler_errors = 1

; Stats logging interval in seconds
stats_period = 60

; ─── Listen Address ────────────────────────────────────────────────────────────
; Listen on all interfaces
listen_addr = 0.0.0.0

; Standard PgBouncer port
listen_port = 6432

; ─── Admin Console ─────────────────────────────────────────────────────────────
; Admin access for SHOW commands
admin_users = postgres

; Stats access for monitoring
stats_users = prometheus_stats

; ─── TLS (uncomment for production) ────────────────────────────────────────────
; client_tls_sslmode = prefer
; client_tls_key_file = /etc/pgbouncer/server.key
; client_tls_cert_file = /etc/pgbouncer/server.crt

; server_tls_sslmode = prefer
; server_tls_ca_file = /etc/pgbouncer/root.crt

; ─── Performance Tuning ────────────────────────────────────────────────────────
; Disable prepared statements in transaction mode (not supported)
; Application should use simple query protocol
max_prepared_statements = 0

; TCP keepalive settings
tcp_keepalive = 1
tcp_keepidle = 30
tcp_keepintvl = 10
tcp_keepcnt = 3

; Packet buffer size
pkt_buf = 4096

; DNS lookup cache time
dns_max_ttl = 15

; Process and socket settings
unix_socket_dir = /var/run/pgbouncer
pidfile = /var/run/pgbouncer/pgbouncer.pid
