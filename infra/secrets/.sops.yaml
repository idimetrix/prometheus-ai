# SOPS configuration for encrypting secrets in git
# https://github.com/getsops/sops
#
# Usage:
#   sops --encrypt --in-place infra/secrets/production.yaml
#   sops --decrypt infra/secrets/production.yaml
#   sops infra/secrets/production.yaml  # edit in-place

creation_rules:
  # Production secrets — encrypted with age key
  - path_regex: infra/secrets/production\.ya?ml$
    age: >-
      age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    # Replace with your actual age public key:
    # age-keygen -o infra/secrets/age-key.txt
    # Export the public key from age-key.txt

  # Staging secrets
  - path_regex: infra/secrets/staging\.ya?ml$
    age: >-
      age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

  # Development secrets (less strict)
  - path_regex: infra/secrets/dev\.ya?ml$
    age: >-
      age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
