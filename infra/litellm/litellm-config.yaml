    litellm_params:
      model: voyage/rerank-2.5
      api_key: os.environ/VOYAGE_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
  success_callback: []
  failure_callback: []
  num_retries: 2
  request_timeout: 120
  allowed_fails: 3
  cooldown_time: 30

router_settings:
  routing_strategy: latency-based-routing
  num_retries: 2
  retry_after: 5
  enable_pre_call_checks: true

general_settings:
  master_key: sk-prometheus-litellm-dev
  alerting:
    - slack
  alert_types:
    - llm_too_slow
    - llm_requests_hanging
