pre-commit:
  jobs:
    - run: pnpm dlx ultracite fix {staged_files}
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: pnpm typecheck
