services:
  test-postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: prometheus_test
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: prometheus_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prometheus_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  test-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
