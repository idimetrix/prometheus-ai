name: "Report a Bug (Claude AI)"
description: "Report a bug — Claude AI will fix it automatically"
title: "[Bug] "
labels: ["claude", "bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Describe the bug. Claude AI will analyze this and create a fix automatically.
  - type: textarea
    id: description
    attributes:
      label: "What's broken?"
      description: "Describe the bug in plain language."
      placeholder: "When I start a new session, the agent gets stuck..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      description: "How can we reproduce this bug?"
      placeholder: |
        1. Go to the dashboard
        2. Click "New Session"
        3. Select an agent
        4. Nothing happens
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "What should happen vs what actually happens"
      description: "Describe the expected behavior and the actual behavior."
      placeholder: |
        Expected: The session should start with the selected agent
        Actual: Nothing happens, no error in console
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "How important is this?"
      options:
        - "Low — cosmetic issue"
        - "Medium — broken but has workaround"
        - "High — broken, no workaround"
        - "Critical — service is down or data loss"
      default: 1
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: "What part of the platform?"
      description: "Which area does this affect?"
      multiple: true
      options:
        - "Web UI / Dashboard"
        - "API / tRPC"
        - "Orchestrator / Agents"
        - "Queue Worker"
        - "Socket Server"
        - "Model Router"
        - "Project Brain"
        - "Database / Schema"
        - "Infrastructure / K8s"
        - "Other"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: "Browser / Device (optional)"
      description: "What browser and device are you using?"
      placeholder: "e.g., Chrome on Windows, Safari on iPhone"
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots (optional)"
      description: "Paste screenshots or drag files here."
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: "Before submitting"
      options:
        - label: "I searched existing issues and this hasn't been reported before"
          required: true
