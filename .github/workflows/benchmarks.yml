name: Benchmarks

on:
  schedule:
    # Weekly on Sunday at 2:00 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      benchmark:
        description: 'Benchmark to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - swe-bench
          - humaneval

permissions:
  contents: read

concurrency:
  group: benchmarks
  cancel-in-progress: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  swe-bench:
    name: SWE-bench Lite
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.benchmark == 'all' ||
      github.event.inputs.benchmark == 'swe-bench'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: prometheus
          POSTGRES_PASSWORD: prometheus
          POSTGRES_DB: prometheus_bench
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://prometheus:prometheus@localhost:5432/prometheus_bench
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:push
      - name: Start services
        run: |
          pnpm dev &
          sleep 15
          curl -sf http://localhost:4000/api/trpc/health.check || exit 1
      - name: Run SWE-bench Lite
        run: ./scripts/run-swe-bench.sh
        timeout-minutes: 120
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: swe-bench-results
          path: benchmarks/results/swe-bench-*.json
          retention-days: 90

  humaneval:
    name: HumanEval
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.benchmark == 'all' ||
      github.event.inputs.benchmark == 'humaneval'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: prometheus
          POSTGRES_PASSWORD: prometheus
          POSTGRES_DB: prometheus_bench
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://prometheus:prometheus@localhost:5432/prometheus_bench
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:push
      - name: Start services
        run: |
          pnpm dev &
          sleep 15
          curl -sf http://localhost:4000/api/trpc/health.check || exit 1
      - name: Run HumanEval
        run: ./scripts/run-humaneval.sh
        timeout-minutes: 60
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: humaneval-results
          path: benchmarks/results/humaneval-*.json
          retention-days: 90

  report:
    name: Report Results
    runs-on: ubuntu-latest
    needs: [swe-bench, humaneval]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download SWE-bench results
        uses: actions/download-artifact@v4
        with:
          name: swe-bench-results
          path: benchmarks/results/
        continue-on-error: true
      - name: Download HumanEval results
        uses: actions/download-artifact@v4
        with:
          name: humaneval-results
          path: benchmarks/results/
        continue-on-error: true
      - name: Generate summary
        run: |
          echo "## Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date:** $(date -Iseconds)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          for f in benchmarks/results/*.json; do
            if [ -f "$f" ]; then
              BENCHMARK=$(jq -r '.benchmark // "unknown"' "$f")
              PASS_RATE=$(jq -r '.summary.passRate // "N/A"' "$f")
              TOTAL=$(jq -r '.summary.totalTasks // .summary.totalProblems // 0' "$f")
              PASSED=$(jq -r '.summary.passed // 0' "$f")
              COST=$(jq -r '.summary.totalCost // "N/A"' "$f")
              DURATION=$(jq -r '.summary.totalDurationSeconds // 0' "$f")

              echo "### ${BENCHMARK}" >> "$GITHUB_STEP_SUMMARY"
              echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
              echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
              echo "| Pass Rate | ${PASS_RATE} |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Passed | ${PASSED}/${TOTAL} |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Cost | ${COST} |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Duration | ${DURATION}s |" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
      - name: Check for regressions
        run: |
          # Compare with previous results if available
          # Flag if pass rate dropped by more than 5%
          echo "Regression check completed (no baseline available for first run)"
