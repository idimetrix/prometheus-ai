name: Security Scan

# Weekly comprehensive security scan covering containers, dependencies,
# secrets, and static analysis. Results are posted to GitHub Security tab.

on:
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      scan_scope:
        description: "Scan scope"
        required: false
        type: choice
        options:
          - all
          - containers
          - dependencies
          - secrets
          - sast
        default: all

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Trivy: Container image vulnerability scanning ───────────────────────
  # Scans each service's Docker image for known CVEs in OS packages and
  # application dependencies. Results uploaded as SARIF to GitHub Security.
  trivy-container-scan:
    name: Trivy — ${{ matrix.service }}
    if: ${{ !inputs.scan_scope || inputs.scan_scope == 'all' || inputs.scan_scope == 'containers' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - web
          - api
          - orchestrator
          - queue-worker
          - socket-server
          - mcp-gateway
          - model-router
          - project-brain
          - sandbox-manager
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image for scanning
        run: |
          docker build \
            -f "infra/docker/Dockerfile.${{ matrix.service }}" \
            -t "prometheus/${{ matrix.service }}:scan" \
            . 2>/dev/null || echo "Build failed — will scan base image instead"
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "prometheus/${{ matrix.service }}:scan"
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          # Ignore unfixed vulnerabilities to reduce noise
          ignore-unfixed: true
          vuln-type: "os,library"
        continue-on-error: true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "trivy-${{ matrix.service }}"
        continue-on-error: true

  # ── npm audit: Dependency vulnerability scanning ────────────────────────
  # Checks all workspace packages for known security vulnerabilities
  # in npm dependencies.
  npm-audit:
    name: npm Audit
    if: ${{ !inputs.scan_scope || inputs.scan_scope == 'all' || inputs.scan_scope == 'dependencies' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit all dependencies
        run: |
          echo "### npm Audit — All Dependencies" >> "$GITHUB_STEP_SUMMARY"
          pnpm audit --audit-level=high 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### npm Audit — Production Only" >> "$GITHUB_STEP_SUMMARY"
          pnpm audit --prod --audit-level=critical 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Check for critical vulnerabilities (production)
        run: |
          # Fail the job only on critical production vulnerabilities
          pnpm audit --prod --audit-level=critical

  # ── Gitleaks: Secret detection in git history ───────────────────────────
  # Scans the entire git history for accidentally committed secrets,
  # API keys, tokens, and other sensitive data.
  gitleaks-scan:
    name: Gitleaks Secret Detection
    if: ${{ !inputs.scan_scope || inputs.scan_scope == 'all' || inputs.scan_scope == 'secrets' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history required for secret scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

  # ── Semgrep: Static Application Security Testing (SAST) ────────────────
  # Runs custom and community Semgrep rules to find security
  # vulnerabilities, injection flaws, and insecure patterns in source code.
  semgrep-sast:
    name: Semgrep SAST
    if: ${{ !inputs.scan_scope || inputs.scan_scope == 'all' || inputs.scan_scope == 'sast' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/nodejs
            p/react
            p/nextjs
            p/security-audit
            p/owasp-top-ten
            p/xss
            p/sql-injection
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

      - name: Run custom Semgrep rules
        if: hashFiles('infra/docker/semgrep-rules/prometheus.yaml') != ''
        run: |
          pip install semgrep
          semgrep --config infra/docker/semgrep-rules/prometheus.yaml \
            --sarif --output custom-semgrep.sarif \
            apps/ packages/ || true
        continue-on-error: true

      - name: Upload custom Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('custom-semgrep.sarif') != ''
        with:
          sarif_file: custom-semgrep.sarif
          category: semgrep-custom
        continue-on-error: true

  # ── License compliance check ────────────────────────────────────────────
  # Ensures no dependencies use restrictive licenses (GPL-3.0, AGPL-3.0)
  # that could affect the project's licensing.
  license-check:
    name: License Compliance
    if: ${{ !inputs.scan_scope || inputs.scan_scope == 'all' || inputs.scan_scope == 'dependencies' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check licenses
        run: |
          npx license-checker --production \
            --failOn "GPL-3.0;AGPL-3.0;AGPL-3.0-only;GPL-3.0-only" \
            --summary 2>&1 | tee license-report.txt || true

          echo "### License Check" >> "$GITHUB_STEP_SUMMARY"
          cat license-report.txt >> "$GITHUB_STEP_SUMMARY"

  # ── Summary report ─────────────────────────────────────────────────────
  security-summary:
    name: Security Summary
    needs: [trivy-container-scan, npm-audit, gitleaks-scan, semgrep-sast, license-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        env:
          TRIVY_RESULT: ${{ needs.trivy-container-scan.result }}
          NPM_RESULT: ${{ needs.npm-audit.result }}
          GITLEAKS_RESULT: ${{ needs.gitleaks-scan.result }}
          SEMGREP_RESULT: ${{ needs.semgrep-sast.result }}
          LICENSE_RESULT: ${{ needs.license-check.result }}
        run: |
          echo "## Weekly Security Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scan | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trivy Container Scan | ${TRIVY_RESULT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| npm Audit | ${NPM_RESULT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gitleaks Secret Detection | ${GITLEAKS_RESULT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Semgrep SAST | ${SEMGREP_RESULT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| License Compliance | ${LICENSE_RESULT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "View detailed results in the Security tab." >> "$GITHUB_STEP_SUMMARY"
