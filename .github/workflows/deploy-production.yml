name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo typecheck
      - run: pnpm turbo build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          SERVICES="web api queue-worker socket-server orchestrator project-brain model-router mcp-gateway sandbox-manager"
          for service in $SERVICES; do
            DOCKERFILE="infra/docker/Dockerfile.${service}"
            if [ ! -f "$DOCKERFILE" ]; then
              DOCKERFILE="infra/docker/Dockerfile.api"
            fi
            docker build -f "$DOCKERFILE" \
              --build-arg SERVICE="${service}" \
              -t "ghcr.io/${{ github.repository }}/${service}:${{ github.sha }}" \
              -t "ghcr.io/${{ github.repository }}/${service}:latest" .
            docker push "ghcr.io/${{ github.repository }}/${service}:${{ github.sha }}"
            docker push "ghcr.io/${{ github.repository }}/${service}:latest"
          done

      - name: Deploy to production
        run: |
          chmod +x infra/scripts/deploy.sh
          bash infra/scripts/deploy.sh production ${{ github.sha }}
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
