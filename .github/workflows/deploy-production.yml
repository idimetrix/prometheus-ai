name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo typecheck
      - run: pnpm turbo build

      - name: Build Docker images
        run: |
          for service in web api queue-worker socket-server; do
            docker build -f "infra/docker/Dockerfile.${service}" \
              -t "ghcr.io/${{ github.repository }}/${service}:${{ github.sha }}" \
              -t "ghcr.io/${{ github.repository }}/${service}:latest" .
          done

      - name: Push to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin
          for service in web api queue-worker socket-server; do
            docker push "ghcr.io/${{ github.repository }}/${service}:${{ github.sha }}"
            docker push "ghcr.io/${{ github.repository }}/${service}:latest"
          done

      - name: Deploy to production
        run: |
          chmod +x infra/scripts/deploy.sh
          bash infra/scripts/deploy.sh production ${{ github.sha }}
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
