name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build-and-push:
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        service:
          - web
          - api
          - queue-worker
          - socket-server
          - orchestrator
          - project-brain
          - model-router
          - mcp-gateway
          - sandbox-manager
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            SERVICE=${{ matrix.service }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to production
        run: |
          chmod +x infra/scripts/deploy.sh
          bash infra/scripts/deploy.sh production ${{ github.sha }}

      - name: Verify deployment health
        run: |
          chmod +x infra/scripts/healthcheck.sh
          bash infra/scripts/healthcheck.sh --k8s production

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production deployment failed for commit ${{ github.sha }}"
