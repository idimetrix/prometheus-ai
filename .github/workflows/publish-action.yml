name: Publish GitHub Action

on:
  push:
    tags:
      - "action-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.0.0)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Bundle Action
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/github-action
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build action bundle
        run: pnpm run build

      - name: Verify dist output
        run: |
          if [ ! -f dist/index.js ]; then
            echo "::error::dist/index.js not found after build"
            exit 1
          fi
          echo "Bundle size: $(wc -c < dist/index.js) bytes"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: action-dist
          path: packages/github-action/dist/
          retention-days: 7

  test:
    name: Test Action
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: action-dist
          path: packages/github-action/dist/

      - name: Dry-run action (validate inputs)
        uses: ./packages/github-action
        continue-on-error: true
        with:
          task: "test: verify action packaging"
          project-id: "test-project-id"
          api-key: "test-api-key"
          api-url: "http://localhost:9999"
          wait: "false"
          timeout: "10"

  publish:
    name: Publish Release
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: action-dist
          path: packages/github-action/dist/

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/action-}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          MAJOR=$(echo "$TAG" | sed -E 's/^v([0-9]+).*/\1/')
          echo "major=v${MAJOR}" >> "$GITHUB_OUTPUT"

      - name: Update major version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "${{ steps.version.outputs.major }}" -m "Update ${{ steps.version.outputs.major }} to ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.major }}" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "action-${{ steps.version.outputs.tag }}"
          name: "Prometheus GitHub Action ${{ steps.version.outputs.tag }}"
          body: |
            ## Prometheus GitHub Action ${{ steps.version.outputs.tag }}

            ### Usage

            ```yaml
            - uses: prometheus/prometheus@${{ steps.version.outputs.major }}
              with:
                task: "Implement feature X"
                project-id: ${{ '{{' }} secrets.PROMETHEUS_PROJECT_ID {{ '}}' }}
                api-key: ${{ '{{' }} secrets.PROMETHEUS_API_KEY {{ '}}' }}
            ```

            See [action.yml](packages/github-action/action.yml) for all available inputs and outputs.
          draft: false
          prerelease: false

  docker:
    name: Build Docker Image
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/action-}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: packages/github-action
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/github-action:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository }}/github-action:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
