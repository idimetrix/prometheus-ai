name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: |
          SERVICES="api web orchestrator project-brain model-router mcp-gateway sandbox-manager queue-worker socket-server"
          for svc in $SERVICES; do
            docker build -f infra/docker/Dockerfile.$svc -t ghcr.io/${{ github.repository }}/$svc:staging .
            docker push ghcr.io/${{ github.repository }}/$svc:staging
          done

      - name: Deploy to staging
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key deploy@"$STAGING_HOST" \
            "cd /opt/prometheus && ./infra/scripts/deploy.sh staging"

      - name: Run smoke tests
        run: |
          sleep 30
          curl -sf https://staging.prometheus.dev/api/health || exit 1
