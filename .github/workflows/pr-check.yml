name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-validation:
    runs-on: ubuntu-latest
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR title format
        run: |
          if ! echo "$PR_TITLE" | grep -qE "^(feat|fix|chore|docs|refactor|test|ci|perf|build|style)(\(.+\))?: .+"; then
            echo "::error::PR title must follow conventional commits format: type(scope): description"
            echo "Examples: feat(api): add user endpoint, fix(web): resolve login bug"
            exit 1
          fi

      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check PR size
        run: |
          ADDITIONS=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1 | awk '{print $4}')
          DELETIONS=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1 | awk '{print $6}')
          TOTAL=$((${ADDITIONS:-0} + ${DELETIONS:-0}))
          echo "Total lines changed: $TOTAL"
          if [ "$TOTAL" -gt 2000 ]; then
            echo "::warning::Large PR detected ($TOTAL lines changed). Consider splitting into smaller PRs."
          fi

      - name: Check for lockfile changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "pnpm-lock.yaml"; then
            echo "::notice::pnpm-lock.yaml was modified - dependency changes detected"
          fi

      - name: Detect affected packages
        id: affected
        run: |
          CHANGED=$(pnpm turbo build --dry-run=json --filter='...[origin/${{ github.base_ref }}...HEAD]' 2>/dev/null | jq -r '.packages | join(", ")' 2>/dev/null || echo "unable to detect")
          echo "packages=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "### Affected packages" >> "$GITHUB_STEP_SUMMARY"
          echo "$CHANGED" >> "$GITHUB_STEP_SUMMARY"

  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3008,DL3018

  k8s-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate k8s manifests
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          ./kubeconform -strict -ignore-missing-schemas infra/k8s/base/**/*.yaml || true
